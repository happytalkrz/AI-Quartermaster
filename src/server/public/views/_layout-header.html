<body class="bg-background text-on-surface font-body selection:bg-primary/30">

<!-- API Key Banner -->
<div id="api-key-banner" style="display:none;" class="fixed top-0 left-0 right-0 z-[999] bg-surface-container-high border-b border-outline-variant/30 px-6 py-3 flex items-center gap-4 flex-wrap">
  <span class="text-sm text-on-surface flex-1 min-w-[200px]">API 키가 필요합니다. <code class="font-mono text-xs bg-surface-container-lowest px-2 py-0.5 rounded border border-outline-variant/20">DASHBOARD_API_KEY</code> 값을 입력하세요.</span>
  <input id="api-key-input" type="password" placeholder="API Key" class="font-mono text-sm px-3 py-1.5 rounded-lg border border-outline-variant/30 bg-surface-container-lowest text-on-surface outline-none w-64 focus:ring-1 focus:ring-primary"/>
  <button onclick="saveApiKey()" class="px-4 py-1.5 rounded-lg bg-primary/10 text-primary border border-primary/30 text-sm font-bold hover:bg-primary/20 transition-colors" data-i18n="save">저장</button>
</div>

<!-- Owners Warning Banner -->
<div id="owners-warning-banner" style="display:none;" class="fixed left-0 right-0 z-[997] bg-gradient-to-r from-error/10 to-error-container/10 border-b border-error/30 px-6 py-3 flex items-center gap-4 flex-wrap">
  <div class="flex items-center gap-2 text-error">
    <span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1;">warning</span>
    <span class="text-sm font-bold">instanceOwners 미설정</span>
  </div>
  <span class="text-sm text-on-surface flex-1 min-w-[200px]">보안 경고: <code class="font-mono text-xs bg-surface-container-lowest px-2 py-0.5 rounded border border-outline-variant/20">instanceOwners</code>가 설정되지 않아 이슈 처리가 차단됩니다. Settings에서 허용할 사용자를 설정하세요.</span>
</div>

<!-- Update Banner -->
<div id="update-banner" style="display:none;" class="fixed left-0 right-0 z-[998] bg-gradient-to-r from-primary/10 to-primary-container/10 border-b border-primary/30 px-6 py-3 flex items-center gap-4 flex-wrap">
  <div class="flex items-center gap-2 text-primary">
    <span class="material-symbols-outlined text-lg animate-pulse" style="font-variation-settings: 'FILL' 1;">update</span>
    <span class="text-sm font-bold">새 업데이트 사용 가능</span>
  </div>
  <span id="update-info" class="text-sm text-on-surface flex-1 min-w-[200px]">새 버전으로 업데이트할 수 있습니다.</span>
  <button id="update-btn" onclick="performUpdate()" class="flex items-center gap-2 px-4 py-1.5 rounded-lg bg-primary text-on-primary font-bold text-sm hover:bg-primary/90 transition-colors active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
    <span id="update-btn-icon" class="material-symbols-outlined text-sm">download</span>
    <span id="update-btn-text">업데이트</span>
  </button>
  <button onclick="dismissUpdate()" class="text-outline hover:text-on-surface p-1 rounded transition-colors" aria-label="닫기">
    <span class="material-symbols-outlined text-lg">close</span>
  </button>
</div>

<!-- TopNavBar -->
<header class="sticky top-0 z-50 flex justify-between items-center px-6 h-16 w-full bg-[#0d1117] dark:bg-[#0d1117] border-b border-[#30363d]">
  <div class="flex items-center gap-8">
    <span class="font-headline font-bold text-primary-container text-lg uppercase tracking-wider">AI Quartermaster</span>
    <span id="instance-label" class="hidden font-mono text-xs text-outline uppercase tracking-widest opacity-70 border border-outline-variant/30 px-2 py-0.5 rounded"></span>
    <span id="instance-owners" class="hidden font-mono text-xs text-outline tracking-wide opacity-70 px-2 py-0.5"></span>
    <nav class="hidden md:flex gap-6">
      <a class="font-body font-bold tracking-tight text-sm text-primary-container border-b-2 border-primary-container py-5 cursor-pointer" data-nav="dashboard" data-i18n="dashboard">Dashboard</a>
      <a class="font-body font-bold tracking-tight text-sm text-slate-400 hover:text-slate-200 transition-colors py-5 cursor-pointer" data-nav="logs" data-i18n="logs">Logs</a>
    </nav>
  </div>
  <div class="flex items-center gap-4">
    <!-- Project selector -->
    <div class="relative">
      <button id="project-selector" onclick="toggleProjectDropdown()" class="flex items-center gap-2 text-xs text-outline hover:text-on-surface transition-colors px-2 py-1.5 rounded-md hover:bg-surface-container-high">
        <span class="material-symbols-outlined text-sm">account_tree</span>
        <span id="current-project-label" data-i18n="allProjects">All Projects</span>
        <span class="material-symbols-outlined text-sm">expand_more</span>
      </button>
      <div id="project-dropdown" class="absolute right-0 top-full mt-1 bg-surface-container-lowest border border-outline-variant/20 rounded-lg shadow-lg min-w-[200px] max-w-[300px] z-50 hidden">
        <div class="p-2">
          <div id="project-dropdown-content">
            <!-- Project options will be populated here -->
          </div>
        </div>
      </div>
    </div>
    <!-- Version info -->
    <div class="flex items-center gap-2 text-xs text-outline">
      <span class="material-symbols-outlined text-sm">info</span>
      <span id="version-label">v0.0.0</span>
      <span id="version-hash" class="font-mono text-[10px] opacity-60"></span>
    </div>
    <!-- Connection status -->
    <div class="flex items-center gap-2 text-xs text-outline">
      <span id="conn-dot" class="w-2 h-2 rounded-full bg-tertiary animate-pulse"></span>
      <span id="conn-label">연결 중...</span>
    </div>
    <!-- Language toggle -->
    <button onclick="toggleLang()" class="flex items-center gap-1 text-slate-400 hover:bg-slate-800/50 px-2 py-1.5 rounded-md transition-all active:scale-95">
      <span class="material-symbols-outlined text-base">translate</span>
      <span class="text-xs font-bold" id="lang-label">KO</span>
    </button>
    <!-- Theme toggle -->
    <button id="btn-theme" class="material-symbols-outlined text-slate-400 hover:bg-slate-800/50 p-2 rounded-md transition-all active:scale-95" onclick="toggleTheme()">dark_mode</button>
  </div>
</header>
