name: CI
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint src/ tests/
      - run: npx vitest run --coverage

  release-smoke:
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - run: npm run smoke
      - run: npx vitest run tests/cli/bind-security-integration.test.ts
