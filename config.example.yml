# AI 병참부 설정 파일
# 이 파일을 config.yml로 복사한 후 수정하세요: cp config.example.yml config.yml

general:
  projectName: "my-project"
  logLevel: "info"
  logDir: "./logs"
  dryRun: false
  locale: "ko"
  concurrency: 1

# 대상 프로젝트 목록
projects:
  - repo: "owner/repo-name"           # GitHub 저장소 (owner/repo)
    path: "/path/to/local/clone"       # 로컬 클론 경로
    baseBranch: "main"                 # 기본 브랜치
    # mode: "code"                     # code (기본) | content (블로그/문서)
    # commands:                        # 프로젝트별 명령어 오버라이드 (선택)
    #   test: "yarn test"
    #   lint: "yarn lint"

git:
  defaultBaseBranch: "main"
  branchTemplate: "aq/{{issueNumber}}-{{slug}}"
  commitMessageTemplate: "[#{{issueNumber}}] {{phase}}: {{summary}}"
  remoteAlias: "origin"
  allowedRepos: []                     # projects를 사용하면 비워둬도 됩니다
  gitPath: "git"
  fetchDepth: 0
  signCommits: false

worktree:
  rootPath: "../.aq-worktrees"
  cleanupOnSuccess: true
  cleanupOnFailure: false
  maxAge: "7d"
  dirTemplate: "{{issueNumber}}-{{slug}}"

commands:
  claudeCli:
    path: "claude"
    model: "claude-opus-4-5"              # 글로벌 기본
    models:
      plan: "claude-opus-4-5"             # Plan 생성 (복잡한 분석)
      phase: "claude-sonnet-4-20250514"   # Phase 구현 (코딩)
      review: "claude-haiku-4-5-20251001" # 리뷰/검증 (확인)
      fallback: "claude-sonnet-4-20250514" # 실패 시 폴백
    maxTurns: 50
    timeout: 600000
    additionalArgs: []
  ghCli:
    path: "gh"
    timeout: 30000
  test: "npm test"
  lint: "npm run lint"
  build: "npm run build"
  typecheck: "npx tsc --noEmit"
  preInstall: "npm ci"

review:
  enabled: true
  rounds:
    - name: "기능 정합성"
      promptTemplate: "review-round1.md"
      failAction: "warn"
      maxRetries: 2
      model: null
    - name: "구조/설계"
      promptTemplate: "review-round2.md"
      failAction: "warn"
      maxRetries: 1
      model: null
    - name: "단순화"
      promptTemplate: "review-round3-simplify.md"
      failAction: "warn"
      maxRetries: 1
      model: null
  simplify:
    enabled: true
    promptTemplate: "review-round3-simplify.md"

pr:
  targetBranch: "main"
  draft: true
  titleTemplate: "[AQ-#{{issueNumber}}] {{title}}"
  bodyTemplate: "pr-body.md"
  labels:
    - "ai-quartermaster"
  assignees: []
  reviewers: []
  linkIssue: true
  autoMerge: false
  mergeMethod: "squash"

safety:
  sensitivePaths:
    - ".env*"
    - "**/*.pem"
    - "**/*.key"
    - "**/secrets/**"
    - "config.local.yml"
    - ".github/workflows/**"
  maxPhases: 10
  maxRetries: 3
  maxTotalDurationMs: 3600000
  maxFileChanges: 30
  maxInsertions: 2000
  maxDeletions: 1000
  requireTests: true
  blockDirectBasePush: true
  timeouts:
    planGeneration: 120000
    phaseImplementation: 300000
    reviewRound: 120000
    prCreation: 30000
  stopConditions:
    - "CRITICAL_ERROR"
    - "SECURITY_VIOLATION"
    - "BASE_BRANCH_MODIFIED"
  allowedLabels:
    - "ai-quartermaster"
  # Rollback strategy on pipeline failure:
  #   "none"        — no rollback (default)
  #   "all"         — reset to pre-pipeline HEAD (undo all phase commits)
  #   "failed-only" — reset to last successful phase commit
  rollbackStrategy: "none"
