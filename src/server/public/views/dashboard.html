  <!-- ============ Dashboard View ============ -->
  <div id="view-dashboard" class="view-panel active">

    <!-- Stats Bar -->
    <section class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
      <div class="bg-surface-container p-5 rounded-xl border-none ring-1 ring-outline-variant/10">
        <div class="text-xs font-medium text-outline uppercase tracking-wider mb-2" data-i18n="totalJobs">Total Jobs</div>
        <div class="flex items-center gap-3">
          <span id="stat-total" class="text-3xl font-headline font-bold text-on-surface">0</span>
          <span class="material-symbols-outlined text-outline">monitoring</span>
        </div>
      </div>
      <div class="bg-surface-container p-5 rounded-xl border-none ring-1 ring-outline-variant/10">
        <div class="text-xs font-medium text-outline uppercase tracking-wider mb-2" data-i18n="successRate">Success Rate</div>
        <div class="flex items-center gap-3">
          <span id="stat-rate" class="text-3xl font-headline font-bold text-on-surface">0%</span>
          <span class="material-symbols-outlined text-[#3fb950]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
        </div>
      </div>
      <div class="bg-surface-container p-5 rounded-xl border-none ring-1 ring-outline-variant/10">
        <div class="text-xs font-medium text-outline uppercase tracking-wider mb-2" data-i18n="active">Active</div>
        <div class="flex items-center gap-3">
          <span id="stat-active" class="text-3xl font-headline font-bold text-on-surface">0</span>
          <div class="relative flex items-center justify-center">
            <div class="absolute w-4 h-4 bg-primary/20 rounded-full pulse-ring"></div>
            <div class="w-2 h-2 bg-primary rounded-full"></div>
          </div>
        </div>
      </div>
      <div class="bg-surface-container p-5 rounded-xl border-none ring-1 ring-outline-variant/10">
        <div class="text-xs font-medium text-outline uppercase tracking-wider mb-2" data-i18n="failed">Failed</div>
        <div class="flex items-center gap-3">
          <span id="stat-failed" class="text-3xl font-headline font-bold text-on-surface">0</span>
          <span class="material-symbols-outlined text-[#f85149]" style="font-variation-settings: 'FILL' 1;">cancel</span>
        </div>
      </div>
    </section>

    <!-- Filter Tabs -->
    <div class="flex items-center gap-3 mb-6">
      <h2 class="text-sm font-headline font-bold text-on-surface uppercase tracking-widest flex items-center gap-2">
        <span class="w-1 h-4 bg-primary-container rounded-full"></span>
        <span data-i18n="recentOps">Operations</span>
      </h2>
      <div class="flex-1"></div>
      <div class="flex gap-1 bg-surface-container rounded-lg p-1 ring-1 ring-outline-variant/10">
        <button class="filter-btn px-3 py-1 text-xs font-bold rounded-md transition-colors bg-primary/10 text-primary" data-filter="all" onclick="setFilter('all')"><span data-i18n="filter.all">전체</span> <span id="cnt-all" class="font-mono">0</span></button>
        <button class="filter-btn px-3 py-1 text-xs font-bold rounded-md transition-colors text-outline hover:text-on-surface" data-filter="running" onclick="setFilter('running')"><span data-i18n="filter.running">진행중</span> <span id="cnt-running" class="font-mono">0</span></button>
        <button class="filter-btn px-3 py-1 text-xs font-bold rounded-md transition-colors text-outline hover:text-on-surface" data-filter="success" onclick="setFilter('success')"><span data-i18n="filter.success">성공</span> <span id="cnt-success" class="font-mono">0</span></button>
        <button class="filter-btn px-3 py-1 text-xs font-bold rounded-md transition-colors text-outline hover:text-on-surface" data-filter="failure" onclick="setFilter('failure')"><span data-i18n="filter.failure">실패</span> <span id="cnt-failure" class="font-mono">0</span></button>
        <button class="filter-btn px-3 py-1 text-xs font-bold rounded-md transition-colors text-outline hover:text-on-surface" data-filter="queued" onclick="setFilter('queued')"><span data-i18n="filter.queued">대기</span> <span id="cnt-queued" class="font-mono">0</span></button>
      </div>
      <div class="flex items-center gap-2 ml-3">
        <span class="text-[10px] font-bold tracking-widest text-outline uppercase" data-i18n="hideArchived">아카이브 숨기기</span>
        <button id="hide-archived-toggle" onclick="toggleArchived()" class="relative inline-flex h-5 w-10 shrink-0 cursor-pointer items-center rounded-full bg-surface-container-high transition-colors focus:outline-none" role="switch" aria-checked="false">
          <span class="pointer-events-none inline-block h-4 w-4 transform rounded-full bg-on-primary shadow ring-0 transition duration-200 ease-in-out translate-x-0.5"></span>
        </button>
      </div>
      <button onclick="clearAllJobs()" class="group flex items-center gap-1.5 px-3 py-1 text-xs font-semibold text-[#f85149] hover:bg-[#f85149]/10 rounded-lg transition-all duration-200 active:scale-95">
        <span class="material-symbols-outlined text-sm">delete_sweep</span>
        <span class="text-[10px] uppercase tracking-wider" data-i18n="clearAll">전체 삭제</span>
      </button>
    </div>

    <!-- Dashboard Layout Grid -->
    <div class="grid grid-cols-12 gap-8">
      <!-- Left: Job List Column -->
      <div class="col-span-4 space-y-4">
        <div id="job-list" class="space-y-3 overflow-y-auto max-h-[calc(100vh-350px)] pr-2 custom-scrollbar">
          <!-- Jobs rendered here dynamically -->
        </div>
        <!-- Empty state -->
        <div id="empty-state" class="hidden flex-col items-center justify-center py-16 text-center">
          <span class="material-symbols-outlined text-5xl text-outline/30 mb-4">inbox</span>
          <p class="text-sm font-bold text-on-surface mb-1">아직 작업이 없습니다</p>
          <p class="text-xs text-outline">GitHub 이슈에 <code class="font-mono text-[10px] bg-surface-container px-1.5 py-0.5 rounded border border-outline-variant/20">/aq implement</code> 명령을 남기면 자동으로 파이프라인이 시작됩니다.</p>
        </div>
        <!-- Filter empty -->
        <div id="filter-empty" class="hidden flex-col items-center justify-center py-12 text-center">
          <span class="material-symbols-outlined text-3xl text-outline/30 mb-2">filter_list_off</span>
          <p class="text-xs text-outline">필터 조건에 맞는 작업이 없습니다</p>
        </div>
      </div>

      <!-- Right: Job Details Column -->
      <div class="col-span-8">
        <div id="job-detail" class="bg-surface-container p-8 rounded-2xl ring-1 ring-outline-variant/20 flex flex-col gap-8 min-h-[400px]">
          <div class="flex items-center justify-center h-full min-h-[300px] text-outline text-sm">작업을 선택하세요</div>
        </div>
        <!-- Mobile Activity Log: directly below job detail -->
        <div id="mobile-activity-log" class="hidden mt-4 bg-surface-container p-6 rounded-2xl ring-1 ring-outline-variant/20">
          <!-- Content will be populated by JavaScript -->
        </div>
      </div>
    </div>
  </div>
