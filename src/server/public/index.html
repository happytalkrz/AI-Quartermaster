<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Quartermaster</title>
  <style>
    /* ── Custom Properties ─────────────────────────────────────── */
    :root {
      --radius-sm:    6px;
      --radius-md:    8px;
      --radius-lg:    12px;
      --font-sans:    'Apple SD Gothic Neo', 'Malgun Gothic', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono:    'JetBrains Mono', 'SF Mono', 'Consolas', 'Liberation Mono', monospace;
      --transition:   150ms cubic-bezier(.2, 0, 0, 1);
      --sidebar-w:    280px;
    }

    /* ── Dark Theme (default) ─────────────────────────────────── */
    [data-theme="dark"] {
      --bg-canvas:    #0d1117;
      --bg-subtle:    #161b22;
      --bg-inset:     #0d1117;
      --bg-overlay:   #1c2128;
      --border:       #30363d;
      --border-muted: #21262d;
      --text-primary: #e6edf3;
      --text-secondary:#8b949e;
      --text-muted:   #484f58;
      --accent:       #58a6ff;
      --accent-muted: #1f6feb33;
      --success:      #3fb950;
      --success-muted:#23863633;
      --warning:      #d29922;
      --warning-muted:#d2992233;
      --danger:       #f85149;
      --danger-muted: #da363333;
      --cancelled:    #484f58;
      --cancelled-muted:#21262d;
      --shadow-sm:    0 1px 2px rgba(1,4,9,.8);
      --shadow-md:    0 3px 12px rgba(1,4,9,.6);
    }

    /* ── Light Theme ──────────────────────────────────────────── */
    [data-theme="light"] {
      --bg-canvas:    #ffffff;
      --bg-subtle:    #f6f8fa;
      --bg-inset:     #ffffff;
      --bg-overlay:   #f0f2f5;
      --border:       #d0d7de;
      --border-muted: #e1e4e8;
      --text-primary: #1f2328;
      --text-secondary:#656d76;
      --text-muted:   #8b949e;
      --accent:       #0969da;
      --accent-muted: #0969da22;
      --success:      #1a7f37;
      --success-muted:#1a7f3722;
      --warning:      #9a6700;
      --warning-muted:#9a670022;
      --danger:       #d1242f;
      --danger-muted: #d1242f22;
      --cancelled:    #8b949e;
      --cancelled-muted:#e1e4e8;
      --shadow-sm:    0 1px 2px rgba(27,31,36,.12);
      --shadow-md:    0 3px 12px rgba(27,31,36,.15);
    }

    /* ── Reset ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--font-sans);
      background: var(--bg-canvas);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Page wrap ───────────────────────────────────────────────── */
    .page-wrap {
      flex: 1;
      width: 100%;
      max-width: 1040px;
      margin: 0 auto;
      padding: 24px 16px 0;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
    }
    .header-left {}
    .header-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.3px;
      line-height: 1.2;
    }
    .header-title span { color: var(--accent); }
    .header-subtitle {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 3px;
      letter-spacing: 0.3px;
    }

    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* theme toggle */
    .btn-theme-toggle {
      background: var(--bg-overlay);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      cursor: pointer;
      padding: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color var(--transition), border-color var(--transition);
    }
    .btn-theme-toggle:hover { color: var(--accent); border-color: var(--accent); }
    [data-theme="dark"] .icon-sun { display: block; }
    [data-theme="dark"] .icon-moon { display: none; }
    [data-theme="light"] .icon-sun { display: none; }
    [data-theme="light"] .icon-moon { display: block; }

    /* connection status */
    .conn-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    .conn-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--cancelled);
      transition: background var(--transition);
      flex-shrink: 0;
    }
    .conn-dot.connected  { background: var(--success); }
    .conn-dot.connecting { background: var(--warning); animation: pulse-warn 1.2s ease-in-out infinite; }
    @keyframes pulse-warn { 0%,100%{opacity:1} 50%{opacity:.35} }

    /* stats pills */
    .stats-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .stat-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg-subtle);
      font-size: 12px;
      line-height: 1;
      white-space: nowrap;
    }
    .stat-pill .stat-label { color: var(--text-secondary); }
    .stat-pill .stat-value { font-weight: 700; font-family: var(--font-mono); font-size: 13px; }
    .stat-pill.pending .stat-value { color: var(--accent); }
    .stat-pill.running .stat-value { color: var(--warning); }
    .stat-pill.success .stat-value { color: var(--success); }
    .stat-pill.failure .stat-value { color: var(--danger); }

    /* bulk delete button */
    .btn-bulk-delete {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: var(--radius-sm);
      background: var(--danger-muted);
      color: var(--danger);
      border: 1px solid #da363355;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition);
      white-space: nowrap;
    }
    .btn-bulk-delete.visible { display: inline-flex; }
    .btn-bulk-delete:hover  { background: #da363344; border-color: var(--danger); }
    .btn-bulk-delete:active { transform: scale(.97); }
    .btn-bulk-delete svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; }

    /* ── Divider ─────────────────────────────────────────────────── */
    .divider {
      border: none;
      border-top: 1px solid var(--border-muted);
      margin-bottom: 20px;
    }

    /* ── Toolbar: section label + filter tabs ────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 14px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* filter tabs */
    .filter-tabs {
      display: flex;
      align-items: center;
      gap: 2px;
      background: var(--bg-subtle);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 3px;
    }
    .filter-tab {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      background: none;
      border: none;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
      white-space: nowrap;
      line-height: 1;
    }
    .filter-tab:hover { color: var(--text-primary); background: var(--bg-overlay); }
    .filter-tab.active {
      color: var(--text-primary);
      background: var(--bg-overlay);
      box-shadow: 0 1px 3px rgba(1,4,9,.5);
    }
    .filter-tab .tab-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 16px;
      padding: 0 4px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      font-family: var(--font-mono);
      background: var(--bg-canvas);
      color: var(--text-muted);
      border: 1px solid var(--border-muted);
      line-height: 1;
    }
    .filter-tab.active .tab-count { color: var(--text-secondary); border-color: var(--border); }
    .filter-tab[data-filter="running"].active .tab-count { color: var(--warning); border-color: #d2992255; }
    .filter-tab[data-filter="success"].active .tab-count { color: var(--success); border-color: #23863655; }
    .filter-tab[data-filter="failure"].active .tab-count { color: var(--danger); border-color: #da363355; }

    /* ── Main content area ───────────────────────────────────────── */
    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* ── Card mode (≤5 jobs or mobile) ──────────────────────────── */
    .jobs-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }

    /* ── Split mode (>5 jobs, not mobile) ───────────────────────── */
    .split-layout {
      display: none;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 24px;
      min-height: 400px;
    }
    .split-layout.visible { display: flex; }

    /* sidebar */
    .split-sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--bg-subtle);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .split-sidebar-inner {
      flex: 1;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    /* sidebar list item */
    .list-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background var(--transition);
      border: 1px solid transparent;
      min-width: 0;
    }
    .list-item:hover { background: var(--bg-overlay); }
    .list-item.active {
      background: var(--bg-overlay);
      border-color: var(--border);
      box-shadow: var(--shadow-sm);
    }
    .list-item-left {
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex: 1;
      min-width: 0;
    }
    .list-item-top {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }
    .list-item-issue {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }
    .list-item-repo {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }
    .list-item-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }
    .list-item-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 6px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .2px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .list-item-badge .badge-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .list-item-badge.queued    { background: var(--accent-muted);    color: var(--accent);         border: 1px solid #1f6feb44; }
    .list-item-badge.queued .badge-dot    { background: var(--accent); }
    .list-item-badge.running   { background: var(--warning-muted);   color: var(--warning);        border: 1px solid #d2992244; }
    .list-item-badge.running .badge-dot   { background: var(--warning); animation: pulse-run 1.4s ease-in-out infinite; }
    .list-item-badge.success   { background: var(--success-muted);   color: var(--success);        border: 1px solid #23863644; }
    .list-item-badge.success .badge-dot   { background: var(--success); }
    .list-item-badge.failure   { background: var(--danger-muted);    color: var(--danger);         border: 1px solid #da363344; }
    .list-item-badge.failure .badge-dot   { background: var(--danger); }
    .list-item-badge.cancelled { background: var(--cancelled-muted); color: var(--text-secondary); border: 1px solid var(--border-muted); }
    .list-item-badge.cancelled .badge-dot { background: var(--cancelled); }

    .list-item-dur {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .list-item-dur.live { color: var(--warning); }

    /* detail panel */
    .split-detail {
      flex: 1;
      background: var(--bg-canvas);
      overflow-y: auto;
      padding: 20px;
      min-width: 0;
    }
    .detail-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 200px;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ── Job Card (shared between card mode and detail panel) ────── */
    .job-card {
      background: var(--bg-subtle);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: border-color var(--transition), box-shadow var(--transition);
      animation: card-in 200ms ease both;
    }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .job-card:hover { border-color: #444c56; box-shadow: var(--shadow-md); }

    /* In detail panel, no hover animation */
    .split-detail .job-card { animation: none; }
    .split-detail .job-card:hover { border-color: var(--border); box-shadow: none; }

    .job-card.status-running  { border-left: 3px solid var(--warning); }
    .job-card.status-success  { border-left: 3px solid var(--success); }
    .job-card.status-failure  { border-left: 3px solid var(--danger); }
    .job-card.status-queued   { border-left: 3px solid var(--accent); }
    .job-card.status-cancelled{ border-left: 3px solid var(--cancelled); }

    .card-body { padding: 14px 16px 12px; }
    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .card-title-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      min-width: 0;
    }
    .issue-badge {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      background: var(--accent-muted);
      border: 1px solid #1f6feb66;
      border-radius: var(--radius-sm);
      padding: 2px 7px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .card-repo {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .card-id {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .3px;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .status-badge .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-badge.queued    { background: var(--accent-muted);    color: var(--accent);         border: 1px solid #1f6feb55; }
    .status-badge.queued .badge-dot    { background: var(--accent); }
    .status-badge.running   { background: var(--warning-muted);   color: var(--warning);        border: 1px solid #d2992255; }
    .status-badge.running .badge-dot   { background: var(--warning); animation: pulse-run 1.4s ease-in-out infinite; }
    .status-badge.success   { background: var(--success-muted);   color: var(--success);        border: 1px solid #23863655; }
    .status-badge.success .badge-dot   { background: var(--success); }
    .status-badge.failure   { background: var(--danger-muted);    color: var(--danger);         border: 1px solid #da363355; }
    .status-badge.failure .badge-dot   { background: var(--danger); }
    .status-badge.cancelled { background: var(--cancelled-muted); color: var(--text-secondary); border: 1px solid var(--border); }
    .status-badge.cancelled .badge-dot { background: var(--cancelled); }
    @keyframes pulse-run { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

    /* pipeline track */
    .pipeline-track { margin: 10px 0; }
    .pipeline-steps {
      display: flex;
      align-items: center;
      gap: 0;
      position: relative;
    }
    .pipe-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      flex: 1;
    }
    .pipe-step-node {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--bg-canvas);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      transition: border-color var(--transition), background var(--transition);
    }
    .pipe-step-node svg {
      width: 10px; height: 10px;
      fill: none; stroke: currentColor;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    .pipe-step-label {
      font-size: 9px;
      color: var(--text-muted);
      margin-top: 4px;
      white-space: nowrap;
      letter-spacing: .3px;
      text-transform: uppercase;
    }
    .pipe-step:not(:last-child)::after {
      content: '';
      position: absolute;
      top: 9px;
      left: calc(50% + 10px);
      right: calc(-50% + 10px);
      height: 2px;
      background: var(--border-muted);
      z-index: 0;
    }
    .pipe-step.done .pipe-step-node    { border-color: var(--success); background: #23863622; color: var(--success); }
    .pipe-step.done::after             { background: var(--success) !important; opacity: .4; }
    .pipe-step.active .pipe-step-node  { border-color: var(--warning); background: #d2992222; color: var(--warning); box-shadow: 0 0 0 3px #d2992220; animation: spin-pulse 1.5s ease-in-out infinite; }
    .pipe-step.active .pipe-step-node svg { animation: spin 2s linear infinite; }
    .pipe-step.active .pipe-step-label { color: var(--warning); }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes spin-pulse {
      0%, 100% { box-shadow: 0 0 0 3px #d2992220; }
      50% { box-shadow: 0 0 0 6px #d2992240; }
    }
    .pipe-step.failed .pipe-step-node  { border-color: var(--danger); background: #da363322; color: var(--danger); }
    .pipe-step.failed .pipe-step-label { color: var(--danger); }
    .pipe-step.pending-step .pipe-step-label { color: var(--text-muted); }

    /* card meta */
    .card-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border-muted);
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-secondary);
    }
    .meta-item svg {
      width: 12px; height: 12px;
      fill: none; stroke: currentColor;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      opacity: .7; flex-shrink: 0;
    }
    .meta-value { font-family: var(--font-mono); font-size: 11px; }
    .duration-live { color: var(--warning); }

    /* card actions */
    .card-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    /* PR link */
    .btn-pr {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: var(--radius-sm);
      background: var(--success-muted);
      color: var(--success);
      border: 1px solid #23863655;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      transition: background var(--transition), border-color var(--transition);
      cursor: pointer;
    }
    .btn-pr:hover  { background: #23863644; border-color: var(--success); }
    .btn-pr svg    { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* cancel/delete button */
    .btn-cancel {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: var(--radius-sm);
      background: var(--danger-muted);
      color: var(--danger);
      border: 1px solid #da363355;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition);
    }
    .btn-cancel:hover  { background: #da363344; border-color: var(--danger); }
    .btn-cancel:active { transform: scale(.97); }
    .btn-cancel svg    { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; }

    /* error box */
    .error-box {
      margin-top: 10px;
      padding: 10px 12px 28px;
      background: #da363315;
      border: 1px solid #da363333;
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: 11px;
      color: #ffa198;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 80px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: max-height .25s ease;
    }
    /* In detail panel always expand error */
    .split-detail .error-box { max-height: none; cursor: default; padding-bottom: 10px; }
    .split-detail .error-box::after { display: none; }
    .error-box.expanded { max-height: 400px; overflow-y: auto; padding-bottom: 10px; }
    .error-box::after {
      content: '▼ expand';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 8px 12px;
      background: linear-gradient(transparent, #1a0505 70%);
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .5px;
      text-transform: uppercase;
      color: var(--danger);
      text-align: center;
    }
    .error-box.expanded::after { content: '▲ collapse'; background: var(--bg-subtle); position: sticky; bottom: 0; display: block; padding: 6px 0; margin-top: 4px; }

    /* ── Empty states ─────────────────────────────────────────────── */
    .empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 24px;
      text-align: center;
      color: var(--text-secondary);
    }
    .empty-state.visible { display: flex; }
    .empty-icon { width: 56px; height: 56px; margin-bottom: 20px; opacity: .3; }
    .empty-title { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; }
    .empty-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; max-width: 380px; }
    .empty-desc code {
      font-family: var(--font-mono);
      font-size: 11px;
      background: var(--bg-overlay);
      padding: 1px 5px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    /* filter-empty (no results for filter) */
    .filter-empty {
      display: none;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 13px;
    }
    .filter-empty.visible { display: flex; }

    /* ── Footer ──────────────────────────────────────────────────── */
    footer {
      margin-top: auto;
      border-top: 1px solid var(--border-muted);
      padding: 14px 16px;
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: .2px;
    }
    footer a { color: var(--text-muted); text-decoration: none; }
    footer a:hover { color: var(--text-secondary); }
    .footer-dot { margin: 0 6px; opacity: .5; }

    /* ── Skeleton ────────────────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-overlay) 25%, #2d333b 50%, var(--bg-overlay) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── Log box ─────────────────────────────────────────────────── */
    .log-box {
      background: var(--bg-inset);
      border: 1px solid var(--border-muted);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-secondary);
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      margin-top: 8px;
    }
    .log-box .log-line { line-height: 1.6; display: block; }
    .log-box .log-fail { color: var(--danger); }
    .log-box .log-pass { color: var(--success); }

    /* current step indicator */
    .current-step {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--warning);
      font-family: var(--font-mono);
      margin-top: 8px;
    }
    .current-step::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--warning);
      animation: pulse-warn 1.2s ease-in-out infinite;
      flex-shrink: 0;
    }

    /* phase results list */
    .phase-list {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .phase-item {
      font-family: var(--font-mono);
      font-size: 11px;
      line-height: 1.5;
      color: var(--text-secondary);
    }
    .phase-item.phase-pass { color: var(--success); }
    .phase-item.phase-fail { color: var(--danger); }

    /* ── Responsive ──────────────────────────────────────────────── */
    @media (max-width: 767px) {
      .header { flex-direction: column; }
      .header-right { align-items: flex-start; }
      .stats-row { justify-content: flex-start; }
      .card-top { flex-direction: column; align-items: flex-start; }
      .card-meta { gap: 12px; }
      .pipe-step-label { display: none; }
      /* always card mode on mobile */
      .split-layout { display: none !important; }
      .jobs-list { display: flex !important; }
    }
  </style>
</head>
<body>

<!-- API Key Banner -->
<div id="api-key-banner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:999;background:var(--bg-overlay);border-bottom:1px solid var(--border);padding:12px 16px;align-items:center;gap:10px;flex-wrap:wrap;">
  <span style="font-size:13px;color:var(--text-primary);flex:1;min-width:200px;">API 키가 필요합니다. <code style="font-family:var(--font-mono);font-size:11px;background:var(--bg-inset);padding:1px 5px;border-radius:4px;border:1px solid var(--border);">DASHBOARD_API_KEY</code> 값을 입력하세요.</span>
  <input id="api-key-input" type="password" placeholder="API Key" style="font-family:var(--font-mono);font-size:13px;padding:5px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-inset);color:var(--text-primary);outline:none;width:260px;" />
  <button onclick="saveApiKey()" style="padding:5px 14px;border-radius:var(--radius-sm);background:var(--accent-muted);color:var(--accent);border:1px solid var(--accent);font-size:13px;cursor:pointer;">저장</button>

<div class="page-wrap">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <h1 class="header-title">AI <span>Quartermaster</span></h1>
    </div>

          <svg class="icon-sun" viewBox="0 0 16 16" width="16" height="16"><circle cx="8" cy="8" r="3" fill="none" stroke="currentColor" stroke-width="1.5"/><g stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="8" y1="1" x2="8" y2="2.5"/><line x1="8" y1="13.5" x2="8" y2="15"/><line x1="1" y1="8" x2="2.5" y2="8"/><line x1="13.5" y1="8" x2="15" y2="8"/><line x1="3.05" y1="3.05" x2="4.11" y2="4.11"/><line x1="11.89" y1="11.89" x2="12.95" y2="12.95"/><line x1="3.05" y1="12.95" x2="4.11" y2="11.89"/><line x1="11.89" y1="4.11" x2="12.95" y2="3.05"/></g></svg>
          <svg class="icon-moon" viewBox="0 0 16 16" width="16" height="16"><path d="M6 1C3.24 1 1 3.24 1 6c0 3.86 4 9 7 9 2.76 0 5-2.24 5-5 0-1.1-.36-2.12-.97-2.95A5.5 5.5 0 016 1z" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>

  <hr class="divider">

  <!-- Toolbar: section label + filter tabs -->
  <div class="toolbar">

    <div class="filter-tabs" role="tablist" aria-label="작업 필터">
      <button class="filter-tab active" role="tab" data-filter="all"    aria-selected="true"  onclick="setFilter('all')">전체<span class="tab-count" id="cnt-all">0</span></button>
      <button class="filter-tab"        role="tab" data-filter="running" aria-selected="false" onclick="setFilter('running')">진행중<span class="tab-count" id="cnt-running">0</span></button>

  <!-- Content area -->
  <div class="content-area">

        GitHub 이슈에 <code>/aq implement</code> 명령을 남기면<br>

<!-- Footer -->

<script>
'use strict';

/* ── API Key management ──────────────────────────────────────── */
const API_KEY_STORAGE = 'aqm-api-key';

function getApiKey() {
  return localStorage.getItem(API_KEY_STORAGE) || '';
}

function setApiKey(key) {
  if (key) localStorage.setItem(API_KEY_STORAGE, key);
  else localStorage.removeItem(API_KEY_STORAGE);
}

function apiFetch(url, opts) {
  const key = getApiKey();
  const headers = Object.assign({}, opts && opts.headers);
  if (key) headers['Authorization'] = 'Bearer ' + key;
  return fetch(url, Object.assign({}, opts, { headers })).then(r => {
    if (r.status === 401) {
      showApiKeyPrompt();
      return Promise.reject(new Error('Unauthorized'));
    }
    return r;
  });
}

function showApiKeyPrompt() {
  document.getElementById('api-key-banner').style.display = 'flex';
}

function hideApiKeyPrompt() {
  document.getElementById('api-key-banner').style.display = 'none';
}

function saveApiKey() {
  const input = document.getElementById('api-key-input');
  setApiKey(input.value.trim());
  hideApiKeyPrompt();
  // Reconnect SSE and reload
  connectSSE();
  apiFetch('/api/jobs').then(r => r.json()).then(handleData).catch(() => {});
}

/* ── SVG icon snippets ───────────────────────────────────────── */
const ICON = {
  clock:  '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6.5"/><path d="M8 4.5V8l2.5 1.5"/></svg>',
  play:   '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6.5"/><path d="M6.5 5.5l4 2.5-4 2.5V5.5z" stroke-width="1.4"/></svg>',
  done:   '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,8 6.5,11.5 13,5"/></svg>',
  fail:   '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg>',
  dot:    '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="8" cy="8" r="2" fill="currentColor" stroke="none"/></svg>',
  link:   '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 3.5H4a3 3 0 0 0 0 6h2.5M9.5 12.5H12a3 3 0 0 0 0-6H9.5M5.5 8h5"/></svg>',
  cancel: '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg>',
  check:  '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,8 6.5,11.5 13,5"/></svg>',
};

/* ── Pipeline stage definitions ─────────────────────────────── */
const PIPELINE_STAGES = [
  { key: 'queued',  label: 'Queued'  },
  { key: 'running', label: 'Running' },
  { key: 'done',    label: 'Done'    },
];

function pipelineStepsHtml(status) {
  let activeIdx = -1;
  let failed = false;
  if (status === 'queued')     { activeIdx = 0; }
  else if (status === 'running')   { activeIdx = 1; }
  else if (status === 'success')   { activeIdx = 2; }
  else if (status === 'failure')   { activeIdx = 1; failed = true; }
  else if (status === 'cancelled') { activeIdx = 0; }

  return PIPELINE_STAGES.map((stage, i) => {
    let cls = 'pipe-step';
    let icon = ICON.dot;
    if (status === 'cancelled') {
      cls += ' pending-step';
    } else if (failed && i === activeIdx) {
      cls += ' failed'; icon = ICON.fail;
    } else if (i < activeIdx || (i === activeIdx && status === 'success')) {
      cls += ' done'; icon = ICON.done;
    } else if (i === activeIdx) {
      cls += ' active'; icon = ICON.play;
    } else {
      cls += ' pending-step';
    }
    return `<div class="${cls}">
      <div class="pipe-step-node">${icon}</div>
      <div class="pipe-step-label">${stage.label}</div>
    </div>`;
  }).join('');
}

/* ── Time helpers ───────────────────────────────────────────── */
function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  if (sameDay) {
    return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
  }
  return d.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' }) + ' ' +
         d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false });
}

function fmtDuration(job) {
  if (!job.startedAt) return null;
  const start = new Date(job.startedAt);
  const end = job.completedAt ? new Date(job.completedAt) : new Date();
  const ms = end - start;
  if (ms < 1000) return ms + 'ms';
  if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
  const m = Math.floor(ms / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  return `${m}m ${s}s`;
}

/* ── Sort jobs: running → queued → rest (by createdAt desc) ─── */
function sortJobs(jobs) {
  const order = { running: 0, queued: 1, failure: 2, success: 3, cancelled: 4 };
  return [...jobs].sort((a, b) => {
    const oa = order[a.status] ?? 9;
    const ob = order[b.status] ?? 9;
    if (oa !== ob) return oa - ob;
    return new Date(b.createdAt) - new Date(a.createdAt);
  });
}

/* ── Simple string hash for diff comparison ──────────────────── */
function simpleHash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  }
  return String(h);
}

function statusLabel(s) {
  const map = { queued: 'Queued', running: 'Running', success: 'Success', failure: 'Failed', cancelled: 'Cancelled' };
  return map[s] || s;
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/* ── Count stats from job list ──────────────────────────────── */
function countStats(jobs) {
  const c = { success: 0, failure: 0 };
  jobs.forEach(j => {
    if (j.status === 'success') c.success++;
    else if (j.status === 'failure') c.failure++;
  });
  return c;
}

/* ── Render phase results list HTML ─────────────────────────── */
function renderPhaseResults(phaseResults) {
  if (!phaseResults || phaseResults.length === 0) return '';
  const items = phaseResults.map((r, i) => {
    const icon = r.success ? '✅' : '❌';
    const commit = r.commit ? ` [${esc(r.commit)}]` : '';
    const dur = (r.durationMs / 1000).toFixed(1) + 's';
    const err = r.error ? ` — ${esc(r.error)}` : '';
    const cls = r.success ? 'phase-item phase-pass' : 'phase-item phase-fail';
    return `<div class="${cls}">${icon} Phase ${i + 1}: ${esc(r.name)}${commit} (${dur})${err}</div>`;
  });
  return `<div class="phase-list">${items.join('')}</div>`;
}

/* ── Render log box HTML for a job ──────────────────────────── */
function renderLogBoxForJob(job, maxLines) {
  if (!job.logs || job.logs.length === 0) return '';
  const lines = maxLines ? job.logs.slice(-maxLines) : job.logs;
  const html = lines.map(line => {
    const cls = line.includes('실패') || line.includes('FAIL') ? 'log-line log-fail'
               : line.includes('PASS') ? 'log-line log-pass'
               : 'log-line';
    return `<span class="${cls}">${esc(line)}</span>`;
  }).join('\n');
  return `<div class="log-box">${html}</div>`;
}

/* ── Render a single job card HTML ──────────────────────────── */
function renderCard(job) {
  const isActive = job.status === 'queued' || job.status === 'running';
  const dur = fmtDuration(job);
  const durClass = (job.status === 'running') ? ' duration-live' : '';

  const metaItems = [
    `<span class="meta-item">${ICON.clock}<span class="meta-value">${fmtTime(job.createdAt)}</span><span style="color:var(--text-muted)">생성</span></span>`,
  ];
  if (job.startedAt) {
    metaItems.push(`<span class="meta-item">${ICON.play}<span class="meta-value">${fmtTime(job.startedAt)}</span><span style="color:var(--text-muted)">시작</span></span>`);
  }
  if (job.completedAt) {
    metaItems.push(`<span class="meta-item">${ICON.check}<span class="meta-value">${fmtTime(job.completedAt)}</span><span style="color:var(--text-muted)">완료</span></span>`);
  }
  if (dur) {
    metaItems.push(`<span class="meta-item">${ICON.clock}<span class="meta-value${durClass}" data-dur="${esc(job.id)}">${dur}</span><span style="color:var(--text-muted)">소요</span></span>`);
  }

  let actions = '';
  if (job.prUrl) {
    actions += `<a class="btn-pr" href="${esc(job.prUrl)}" target="_blank" rel="noopener">${ICON.link} PR 보기</a>`;
  }
  if (isActive) {
    actions += `<button class="btn-cancel" onclick="cancelJob('${esc(job.id)}')" aria-label="Cancel job">${ICON.cancel} 취소</button>`;
  } else {
    actions += `<button class="btn-cancel" onclick="deleteJob('${esc(job.id)}')" aria-label="Delete job">${ICON.cancel} 삭제</button>`;
  }

  let errorHtml = '';
  if (job.error) {
    errorHtml = `<div class="error-box" onclick="this.classList.toggle('expanded')" role="button" tabindex="0" aria-expanded="false">${esc(job.error)}</div>`;
  }

  // currentStep: show for running jobs
  let currentStepHtml = '';
  if (job.status === 'running' && job.currentStep) {
    currentStepHtml = `<div class="current-step">${esc(job.currentStep)}</div>`;
  }

  // phaseResults: show if available
  const phaseHtml = renderPhaseResults(job.phaseResults);

  // logs: for running jobs show last 5 lines; for failed jobs show last 20 lines
  let logHtml = '';
  if (job.status === 'running' && job.logs && job.logs.length > 0) {
    logHtml = renderLogBoxForJob(job, 5);
  } else if (job.status === 'failure' && job.logs && job.logs.length > 0) {
    logHtml = renderLogBoxForJob(job, 20);
  }

  return `<article class="job-card status-${job.status}" data-id="${esc(job.id)}" data-status="${job.status}" role="listitem">
  <div class="card-body">
    <div class="card-top">
      <div class="card-title-group">
        <span class="issue-badge">#${job.issueNumber}</span>
        <div>
          <div class="card-repo">${esc(job.repo)}</div>
          <div class="card-id">${esc(job.id)}</div>
        </div>
      </div>
      <span class="status-badge ${job.status}"><span class="badge-dot"></span>${statusLabel(job.status)}</span>
    </div>
    <div class="pipeline-track">
      <div class="pipeline-steps" role="list" aria-label="Pipeline progress">
        ${pipelineStepsHtml(job.status)}
      </div>
    </div>
    ${currentStepHtml}
    <div class="card-meta">${metaItems.join('')}</div>
    ${actions ? `<div class="card-actions">${actions}</div>` : ''}
    ${errorHtml}
    ${phaseHtml}
    ${logHtml}
  </div>
</article>`;
}

/* ── Render sidebar list item HTML ──────────────────────────── */
function renderListItem(job, isSelected) {
  const dur = fmtDuration(job);
  const durLiveClass = job.status === 'running' ? ' live' : '';
  return `<div class="list-item${isSelected ? ' active' : ''}" data-id="${esc(job.id)}" data-status="${job.status}" role="button" tabindex="0" onclick="selectJob('${esc(job.id)}')" onkeydown="if(event.key==='Enter')selectJob('${esc(job.id)}')">
  <div class="list-item-left">
    <div class="list-item-top">
      <span class="list-item-issue">#${job.issueNumber}</span>
      <span class="list-item-repo">${esc(job.repo)}</span>
    </div>
    <div class="list-item-bottom">
      <span class="list-item-badge ${job.status}"><span class="badge-dot"></span>${statusLabel(job.status)}</span>
      ${dur ? `<span class="list-item-dur${durLiveClass}" data-list-dur="${esc(job.id)}">${dur}</span>` : ''}
    </div>
  </div>
</div>`;
}

/* ── State ───────────────────────────────────────────────────── */
let currentJobs = [];
let currentFilter = 'all';
let selectedJobId = null;
const SPLIT_THRESHOLD = 5;

/* ── Filter helpers ─────────────────────────────────────────── */
function filterJobs(jobs) {
  if (currentFilter === 'all') return jobs;
  if (currentFilter === 'running') return jobs.filter(j => j.status === 'queued' || j.status === 'running');
  return jobs.filter(j => j.status === currentFilter);
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(tab => {
    const active = tab.dataset.filter === f;
    tab.classList.toggle('active', active);
    tab.setAttribute('aria-selected', active ? 'true' : 'false');
  });
  renderFromState();
}

/* ── Layout mode decision ───────────────────────────────────── */
function isMobile() {
  return window.innerWidth < 768;
}

function useSplitMode(filteredJobs) {
  return filteredJobs.length > SPLIT_THRESHOLD && !isMobile();
}

/* ── Main render ─────────────────────────────────────────────── */
function render(data) {
  currentJobs = sortJobs(data.jobs || []);
  const q = data.queue || {};
  const stats = countStats(currentJobs);

  /* stats pills */
  document.getElementById('stat-pending').textContent = q.pending ?? 0;
  document.getElementById('stat-running').textContent = q.running ?? 0;
  document.getElementById('stat-success').textContent = stats.success;
  document.getElementById('stat-failed').textContent  = stats.failure;

  renderFromState();
}

function renderFromState() {
  const allJobs = currentJobs;
  const filtered = filterJobs(allJobs);

  /* update tab counts */
  document.getElementById('cnt-all').textContent     = allJobs.length;
  document.getElementById('cnt-running').textContent = allJobs.filter(j => j.status === 'queued' || j.status === 'running').length;
  document.getElementById('cnt-success').textContent = allJobs.filter(j => j.status === 'success').length;
  document.getElementById('cnt-failure').textContent = allJobs.filter(j => j.status === 'failure').length;

  /* section label */
  document.getElementById('section-label').textContent =
    allJobs.length > 0 ? `Jobs (${allJobs.length})` : 'Jobs';

  /* bulk delete button: show when there are completed/failed/cancelled jobs */
  const completedCount = allJobs.filter(j => j.status === 'success' || j.status === 'failure' || j.status === 'cancelled').length;
  document.getElementById('btn-bulk-delete').classList.toggle('visible', completedCount > 0);

  const listEl   = document.getElementById('jobs-list');
  const splitEl  = document.getElementById('split-layout');
  const emptyEl  = document.getElementById('empty-state');
  const fEmptyEl = document.getElementById('filter-empty');

  /* hide everything first */
  emptyEl.classList.remove('visible');
  fEmptyEl.classList.remove('visible');

  if (allJobs.length === 0) {
    /* no jobs at all */
    listEl.innerHTML = '';
    splitEl.classList.remove('visible');
    listEl.style.display = 'none';
    emptyEl.classList.add('visible');
    startLiveTickers();
    return;
  }

  if (filtered.length === 0) {
    /* jobs exist but filter has no results */
    listEl.innerHTML = '';
    splitEl.classList.remove('visible');
    listEl.style.display = 'none';
    fEmptyEl.classList.add('visible');
    startLiveTickers();
    return;
  }

  if (useSplitMode(filtered)) {
    /* ── Split mode ── */
    listEl.style.display = 'none';
    listEl.innerHTML = '';
    splitEl.classList.add('visible');

    /* auto-select: prefer first running/queued, else first */
    if (!selectedJobId || !filtered.find(j => j.id === selectedJobId)) {
      const firstActive = filtered.find(j => j.status === 'running' || j.status === 'queued');
      selectedJobId = (firstActive || filtered[0]).id;
    }

    renderSidebar(filtered);
    renderDetail(filtered.find(j => j.id === selectedJobId) || filtered[0]);
  } else {
    /* ── Card mode ── */
    splitEl.classList.remove('visible');
    listEl.style.display = '';

    diffRenderCards(filtered, listEl);
  }

  startLiveTickers();
}

/* ── Diff-render cards ───────────────────────────────────────── */
function diffRenderCards(jobs, list) {
  const existing = new Map();
  list.querySelectorAll('[data-id]').forEach(el => existing.set(el.dataset.id, el));

  let prevNode = null;
  jobs.forEach(job => {
    const old = existing.get(job.id);
    if (old) {
      if (old.dataset.status !== job.status) {
        const tmpl = document.createElement('template');
        tmpl.innerHTML = renderCard(job);
        const newEl = tmpl.content.firstElementChild;
        old.replaceWith(newEl);
        prevNode = newEl;
      } else {
        prevNode = old;
      }
      existing.delete(job.id);
    } else {
      const tmpl = document.createElement('template');
      tmpl.innerHTML = renderCard(job);
      const newEl = tmpl.content.firstElementChild;
      if (prevNode) prevNode.after(newEl);
      else list.prepend(newEl);
      prevNode = newEl;
    }
  });

  /* remove stale cards */
  existing.forEach(el => el.remove());
}

/* ── Render split sidebar ────────────────────────────────────── */
function renderSidebar(jobs) {
  const container = document.getElementById('sidebar-list');
  const existing = new Map();
  container.querySelectorAll('[data-id]').forEach(el => existing.set(el.dataset.id, el));

  let prevNode = null;
  jobs.forEach(job => {
    const isSelected = job.id === selectedJobId;
    const old = existing.get(job.id);
    if (old) {
      /* update active state */
      old.classList.toggle('active', isSelected);
      /* update status/dur if changed */
      if (old.dataset.status !== job.status) {
        const tmpl = document.createElement('template');
        tmpl.innerHTML = renderListItem(job, isSelected);
        const newEl = tmpl.content.firstElementChild;
        old.replaceWith(newEl);
        prevNode = newEl;
      } else {
        prevNode = old;
      }
      existing.delete(job.id);
    } else {
      const tmpl = document.createElement('template');
      tmpl.innerHTML = renderListItem(job, isSelected);
      const newEl = tmpl.content.firstElementChild;
      if (prevNode) prevNode.after(newEl);
      else container.prepend(newEl);
      prevNode = newEl;
    }
  });
  existing.forEach(el => el.remove());
}

/* ── Render detail panel ─────────────────────────────────────── */
function renderDetail(job) {
  const panel = document.getElementById('split-detail');
  if (!job) {
    panel.innerHTML = '<div class="detail-empty">작업을 선택하세요</div>';
    return;
  }
  // Build card HTML then append detail-specific extras (full logs)
  let html = renderCard(job);

  // Append full log box (last 20 lines) separately after the card for the detail panel
  if (job.logs && job.logs.length > 0) {
    const lines = job.logs.slice(-20);
    const logLines = lines.map(line => {
      const cls = line.includes('실패') || line.includes('FAIL') ? 'log-line log-fail'
                 : line.includes('PASS') ? 'log-line log-pass'
                 : 'log-line';
      return `<span class="${cls}">${esc(line)}</span>`;
    }).join('\n');
    html += `<div style="padding: 0 16px 16px"><div class="log-box" id="detail-log-box">${logLines}</div></div>`;
  }

  panel.innerHTML = html;

  // Auto-scroll log box to bottom
  const lb = panel.querySelector('#detail-log-box');
  if (lb) lb.scrollTop = lb.scrollHeight;
}

/* ── Select a job in split mode ──────────────────────────────── */
function selectJob(id) {
  selectedJobId = id;
  const filtered = filterJobs(currentJobs);
  /* update sidebar active states */
  document.querySelectorAll('#sidebar-list .list-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
  const job = filtered.find(j => j.id === id);
  renderDetail(job);
}

/* ── Live duration tick ──────────────────────────────────────── */
let tickerInterval = null;
function startLiveTickers() {
  if (tickerInterval) clearInterval(tickerInterval);
  tickerInterval = setInterval(() => {
    const runningJobs = currentJobs.filter(j => j.status === 'running');
    runningJobs.forEach(job => {
      const dur = fmtDuration(job);
      if (!dur) return;
      /* card mode duration elements */
      document.querySelectorAll(`[data-dur="${CSS.escape(job.id)}"]`).forEach(el => {
        el.textContent = dur;
      });
      /* sidebar list item duration elements */
      document.querySelectorAll(`[data-list-dur="${CSS.escape(job.id)}"]`).forEach(el => {
        el.textContent = dur;
      });
    });
  }, 1000);
}

/* ── Cancel a job ────────────────────────────────────────────── */
function cancelJob(id) {
  const btns = document.querySelectorAll(`[data-id="${CSS.escape(id)}"] .btn-cancel`);
  btns.forEach(btn => { btn.disabled = true; btn.style.opacity = '.5'; });
  apiFetch('/api/jobs/' + encodeURIComponent(id) + '/cancel', { method: 'POST' })
    .catch(() => {
      btns.forEach(btn => { btn.disabled = false; btn.style.opacity = ''; });
    });
}

/* ── Delete a job ────────────────────────────────────────────── */
function deleteJob(id) {
  /* fade out card and list item */
  const targets = [
    ...document.querySelectorAll(`.job-card[data-id="${CSS.escape(id)}"]`),
    ...document.querySelectorAll(`.list-item[data-id="${CSS.escape(id)}"]`),
  ];
  targets.forEach(el => { el.style.opacity = '.5'; el.style.transition = 'opacity .3s'; });

  apiFetch('/api/jobs/' + encodeURIComponent(id), { method: 'DELETE' })
    .then(r => {
      if (r.ok) {
        targets.forEach(el => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); });
        /* if deleted job was selected in split mode, deselect */
        if (selectedJobId === id) {
          selectedJobId = null;
          /* re-render will auto-select */
        }
      } else {
        targets.forEach(el => { el.style.opacity = ''; });
      }
    })
    .catch(() => { targets.forEach(el => { el.style.opacity = ''; }); });
}

/* ── Bulk delete completed/failed/cancelled jobs ─────────────── */
function bulkDelete() {
  const targets = currentJobs.filter(j => j.status === 'success' || j.status === 'failure' || j.status === 'cancelled');
  if (targets.length === 0) return;
  if (!confirm(`완료된 작업 ${targets.length}개를 삭제하시겠습니까?`)) return;
  targets.forEach(j => deleteJob(j.id));
}

/* ── Theme toggle ────────────────────────────────────────────── */
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('aqm-theme', next);
}
/* Restore saved theme */
(function() {
  const saved = localStorage.getItem('aqm-theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
})();

/* ── SSE connection with reconnect ──────────────────────────── */
let es = null;
let reconnectTimer = null;
const connDot   = document.getElementById('conn-dot');
const connLabel = document.getElementById('conn-label');

function setConnState(state) {
  connDot.className = 'conn-dot ' + state;
  if (state === 'connected')       connLabel.textContent = 'Connected';
  else if (state === 'connecting') connLabel.textContent = '연결 중...';
  else                             connLabel.textContent = 'Disconnected';
}

function handleData(data) {
  currentJobs = sortJobs(data.jobs || []);
  render(data);
}

function connectSSE() {
  if (es) { try { es.close(); } catch(e) {} }
  setConnState('connecting');
  const key = getApiKey();
  const sseUrl = key ? '/api/events?key=' + encodeURIComponent(key) : '/api/events';
  es = new EventSource(sseUrl);
  es.onopen = () => {
    setConnState('connected');
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  };
  es.onmessage = (e) => {
    try { handleData(JSON.parse(e.data)); } catch (_) {}
  };
  es.onerror = () => {
    setConnState('disconnected');
    es.close();
    reconnectTimer = setTimeout(connectSSE, 4000);
  };
}

/* ── Responsive: re-render on resize crossing breakpoint ─────── */
let lastMobile = isMobile();
window.addEventListener('resize', () => {
  const nowMobile = isMobile();
  if (nowMobile !== lastMobile) {
    lastMobile = nowMobile;
    renderFromState();
  }
});

/* ── Boot ────────────────────────────────────────────────────── */
apiFetch('/api/jobs')
  .then(r => r.json())
  .then(handleData)
  .catch(() => {});

connectSSE();

/* Keyboard: toggle error box with Enter when focused */
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.target.classList.contains('error-box')) {
    e.target.classList.toggle('expanded');
  }
});
</script>
