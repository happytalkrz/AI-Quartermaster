  <!-- ============ Skip Events View ============ -->
  <div id="view-skip-events" class="view-panel">
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-sm font-headline font-bold text-on-surface uppercase tracking-widest flex items-center gap-2">
        <span class="w-1 h-4 bg-primary-container rounded-full"></span>
        <span>거부된 이슈</span>
        <span id="skip-events-total" class="text-xs font-mono text-outline ml-2">0</span>
      </h2>
      <button onclick="loadSkipEvents()" class="flex items-center gap-1.5 px-3 py-1.5 bg-surface-container-high text-outline text-xs font-bold rounded-lg ring-1 ring-outline-variant/20 hover:bg-surface-bright transition-colors">
        <span class="material-symbols-outlined text-sm">refresh</span> 새로고침
      </button>
    </div>
    <div id="skip-events-table" class="bg-surface-container rounded-xl ring-1 ring-outline-variant/10 overflow-hidden">
      <table class="w-full text-left">
        <thead>
          <tr class="border-b border-outline-variant/20 bg-surface-container-high">
            <th class="px-4 py-3 text-[10px] font-bold uppercase tracking-widest text-outline">Issue</th>
            <th class="px-4 py-3 text-[10px] font-bold uppercase tracking-widest text-outline">Repo</th>
            <th class="px-4 py-3 text-[10px] font-bold uppercase tracking-widest text-outline">Reason Code</th>
            <th class="px-4 py-3 text-[10px] font-bold uppercase tracking-widest text-outline">Message</th>
            <th class="px-4 py-3 text-[10px] font-bold uppercase tracking-widest text-outline">Source</th>
            <th class="px-4 py-3 text-[10px] font-bold uppercase tracking-widest text-outline">Time</th>
          </tr>
        </thead>
        <tbody id="skip-events-content">
          <tr><td colspan="6" class="px-4 py-12 text-center text-outline text-sm">데이터를 불러오려면 페이지를 열어주세요.</td></tr>
        </tbody>
      </table>
    </div>
    <div id="skip-events-empty" class="hidden"></div>
  </div>
