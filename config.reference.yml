# AI 병참부 설정 파일 - 전체 옵션 레퍼런스
# 최소 설정은 config.yml을 참조하세요
# 이 파일을 config.yml로 복사한 후 필요한 부분만 수정하세요: cp config.reference.yml config.yml

# ===== 환경변수 설정 =====
# 설정 파일 외에도 AQM_* 환경변수로 런타임 오버라이드가 가능합니다.
# 우선순위: 기본값 < config.yml < config.local.yml < 환경변수 < CLI --config-override
#
# 네이밍 규칙: AQM_섹션_필드명 (언더스코어로 구분, 대문자)
# 중첩 필드: AQM_섹션_하위섹션_필드명
#
# 타입 변환:
# - 숫자: "123" → 123
# - 불리언: "true"/"false" → true/false
# - 배열: "item1,item2,item3" → ["item1", "item2", "item3"]
# - 문자열: 그대로 사용
#
# 예시:
# export AQM_GENERAL_LOG_LEVEL=debug
# export AQM_GENERAL_CONCURRENCY=5
# export AQM_GENERAL_DRY_RUN=true
# export AQM_SAFETY_ALLOWED_LABELS=bug,enhancement,feature
# export AQM_COMMANDS_CLAUDE_CLI_MODEL=claude-opus-4-6
# export AQM_COMMANDS_CLAUDE_CLI_MAX_TURNS=100
# export AQM_SAFETY_TIMEOUTS_PHASE_IMPLEMENTATION=900000
#
# CLI 오버라이드와 함께 사용:
# aqm process --config-override '{"general":{"logLevel":"warn"}}' issue-123
# (이 경우 CLI가 환경변수보다 우선함)

general:                                 # [선택] 전체 설정 (모든 필드에 기본값 있음)
  projectName: "my-project"              # [선택] 프로젝트 이름 (기본값: "ai-quartermaster")
  logLevel: "info"                       # [선택] 로그 레벨: debug | info | warn | error (기본값: "info")
  logDir: "./logs"                       # [선택] 로그 디렉토리 (기본값: "logs")
  dryRun: false                          # [선택] 드라이 런 모드 (기본값: false)
  locale: "ko"                           # [선택] 언어: ko | en (기본값: "en")
  concurrency: 1                         # [선택] 동시 처리 수 (기본값: 1)
  # autoUpdate: false                    # [선택] 자동 업데이트 (git pull + 재시작) (기본값: false)
  # stuckTimeoutMs: 600000               # [선택] stuck job 감지 타임아웃 ms (기본값: 600000)
  # pollingIntervalMs: 60000             # [선택] 폴링 간격 ms (기본값: 60000)
  # maxJobs: 500                         # [선택] 최대 job 보관 수 (기본값: 500)

# 대상 프로젝트 목록
projects:                                # [선택] 프로젝트별 설정 (없으면 git.allowedRepos 사용)
  - repo: "owner/repo-name"              # [필수] GitHub 저장소 (owner/repo)
    path: "/path/to/local/clone"         # [필수] 로컬 클론 경로
    baseBranch: "main"                   # [선택] 기본 브랜치 (기본값: git.defaultBaseBranch)
    # mode: "code"                       # [선택] 파이프라인 모드: code | content (기본값: "code")
    # concurrency: 2                     # [선택] 프로젝트별 동시 실행 수 (기본값: general.concurrency)
    # commands:                          # [선택] 프로젝트별 명령어 오버라이드
    #   test: "yarn test"                # [선택] 테스트 명령어
    #   lint: "yarn lint"                # [선택] 린트 명령어

git:                                     # [선택] Git 설정 (모든 필드에 기본값 있음)
  defaultBaseBranch: "main"              # [선택] 기본 브랜치 (기본값: "main")
  branchTemplate: "aq/{{issueNumber}}-{{slug}}"  # [선택] 브랜치 이름 템플릿
  commitMessageTemplate: "[#{{issueNumber}}] {{phase}}: {{summary}}"  # [선택] 커밋 메시지 템플릿
  remoteAlias: "origin"                  # [선택] 원격 저장소 별명 (기본값: "origin")
  allowedRepos: []                       # [선택] 허용된 저장소 목록 (projects 사용 시 비워둘 수 있음)
  gitPath: "git"                         # [선택] git 명령어 경로 (기본값: "git")
  fetchDepth: 1                          # [선택] fetch 깊이 (기본값: 1)
  signCommits: false                     # [선택] 커밋 서명 여부 (기본값: false)

worktree:                                # [선택] 워크트리 설정 (모든 필드에 기본값 있음)
  rootPath: "../.aq-worktrees"           # [선택] 워크트리 루트 경로 (기본값: ".worktrees")
  cleanupOnSuccess: true                 # [선택] 성공 시 정리 (기본값: true)
  cleanupOnFailure: false                # [선택] 실패 시 정리 (기본값: false)
  maxAge: "24h"                          # [선택] 최대 보관 기간 (기본값: "24h")
  dirTemplate: "{{issueNumber}}-{{slug}}" # [선택] 디렉토리 이름 템플릿

commands:                                # [선택] 명령어 설정 (모든 필드에 기본값 있음)
  claudeCli:                             # [선택] Claude CLI 설정
    path: "claude"                       # [선택] claude 명령어 경로 (기본값: "claude")
    model: "claude-opus-4-5"             # [선택] 글로벌 기본 모델
    models:                              # [선택] 태스크별 모델 라우팅
      plan: "claude-opus-4-5"            # [선택] Plan 생성용 모델 (복잡한 분석)
      phase: "claude-sonnet-4-20250514"  # [선택] Phase 구현용 모델 (코딩)
      review: "claude-haiku-4-5-20251001" # [선택] 리뷰/검증용 모델
      fallback: "claude-sonnet-4-20250514" # [선택] 실패 시 폴백 모델
    maxTurns: 50                         # [선택] 최대 턴 수 (기본값: 50)
    maxTurnsPerMode:                     # [선택] 실행 모드별 최대 턴 수 (기본값: economy=30, standard=60, thorough=120)
      economy: 30                        # [선택] Economy 모드 최대 턴 수
      standard: 60                       # [선택] Standard 모드 최대 턴 수
      thorough: 120                      # [선택] Thorough 모드 최대 턴 수
    timeout: 600000                      # [선택] 타임아웃 ms (기본값: 600000)
    additionalArgs: []                   # [선택] 추가 인수 (기본값: [])
    # retry:                             # [선택] 재시도 설정
    #   maxRetries: 3                    # [선택] 최대 재시도 횟수 (기본값: 3)
    #   initialDelayMs: 5000             # [선택] 초기 지연시간 ms (기본값: 5000)
    #   maxDelayMs: 60000                # [선택] 최대 지연시간 ms (기본값: 60000)
    #   jitterFactor: 0.1                # [선택] 지터 팩터 0-1 (기본값: 0.1)
  ghCli:                                 # [선택] GitHub CLI 설정
    path: "gh"                           # [선택] gh 명령어 경로 (기본값: "gh")
    timeout: 30000                       # [선택] 타임아웃 ms (기본값: 30000)
    # retry:                             # [선택] 재시도 설정
    #   maxRetries: 3                    # [선택] 최대 재시도 횟수 (기본값: 3)
    #   initialDelayMs: 2000             # [선택] 초기 지연시간 ms (기본값: 2000)
    #   maxDelayMs: 30000                # [선택] 최대 지연시간 ms (기본값: 30000)
    #   jitterFactor: 0.1                # [선택] 지터 팩터 0-1 (기본값: 0.1)
  test: "npm test"                       # [선택] 테스트 명령어 (기본값: "npm test")
  lint: "npm run lint"                   # [선택] 린트 명령어 (기본값: "npm run lint")
  build: "npm run build"                 # [선택] 빌드 명령어 (기본값: "npm run build")
  typecheck: "npx tsc --noEmit"          # [선택] 타입체크 명령어 (기본값: "npm run typecheck")
  preInstall: "npm ci"                   # [선택] 설치 전 명령어 (기본값: "")
  # claudeMdPath: "CLAUDE.md"            # [선택] 프로젝트 컨벤션 파일 경로 (기본값: "CLAUDE.md")
  # skillsPath: ".claude/skills"         # [선택] 스킬 디렉토리 경로 (기본값: ".claude/skills")

review:                                  # [선택] 리뷰 설정 (모든 필드에 기본값 있음)
  enabled: true                          # [선택] 리뷰 활성화 여부 (기본값: true)
  rounds:                                # [선택] 리뷰 라운드 설정
    - name: "code-review"                # [선택] 라운드 이름
      promptTemplate: "review-round1.md" # [선택] 프롬프트 템플릿
      failAction: "warn"                 # [선택] 실패 시 동작: block | warn | retry (기본값: "warn")
      maxRetries: 2                      # [선택] 최대 재시도 횟수 (기본값: 2)
      model: null                        # [선택] 사용할 모델 (null이면 기본 모델)
      blind: true                        # [선택] 구현 맥락 차단 (기본값: true)
      adversarial: true                  # [선택] 적대적 리뷰 모드 (기본값: true)
    # 필요 시 추가 라운드:
    # - name: "구조/설계"                  # [선택] 추가 리뷰 라운드
    #   promptTemplate: "review-round2.md"
    #   failAction: "warn"
    #   maxRetries: 1
    #   model: null
  simplify:                              # [선택] 코드 간소화 설정
    enabled: false                       # [선택] 간소화 활성화 여부 (기본값: false)
    promptTemplate: "review-round3-simplify.md"  # [선택] 간소화 프롬프트 템플릿
  # unifiedMode: false                   # [선택] 통합 리뷰 모드 - 1회 호출로 3가지 관점 통합 평가 (기본값: false)

pr:                                      # [선택] PR 설정 (모든 필드에 기본값 있음)
  targetBranch: "main"                   # [선택] 대상 브랜치 (기본값: "main")
  draft: true                            # [선택] 드래프트 PR 생성 여부 (기본값: true)
  titleTemplate: "[AQ-#{{issueNumber}}] {{title}}"  # [선택] PR 제목 템플릿
  bodyTemplate: "pr-body.md"             # [선택] PR 본문 템플릿
  labels:                                # [선택] PR 라벨 (기본값: [])
    - "ai-quartermaster"
  assignees: []                          # [선택] 담당자 목록 (기본값: [])
  reviewers: []                          # [선택] 리뷰어 목록 (기본값: [])
  linkIssue: true                        # [선택] 이슈 연결 여부 (기본값: true)
  autoMerge: false                       # [선택] 자동 머지 여부 (기본값: false)
  mergeMethod: "squash"                  # [선택] 머지 방법: merge | squash | rebase (기본값: "squash")
  # deleteBranch: false                  # [선택] 머지 후 브랜치 삭제 여부 (기본값: false)

safety:                                  # [선택] 안전장치 설정 (모든 필드에 기본값 있음)
  strict: true                           # [선택] 엄격한 안전장치 모드 (기본값: true)
  sensitivePaths:                        # [선택] 민감한 경로 패턴 목록
    - ".env*"
    - "**/*.pem"
    - "**/*.key"
    - "**/secrets/**"
    - "config.local.yml"
    - ".github/workflows/**"
  maxPhases: 10                          # [선택] 최대 Phase 수 (기본값: 10)
  maxRetries: 3                          # [선택] 최대 재시도 횟수 (기본값: 3)
  maxTotalDurationMs: 3600000            # [선택] 최대 총 실행 시간 ms (기본값: 3600000)
  maxFileChanges: 50                     # [선택] 최대 파일 변경 수 (기본값: 50)
  maxInsertions: 2000                    # [선택] 최대 삽입 라인 수 (기본값: 2000)
  maxDeletions: 1000                     # [선택] 최대 삭제 라인 수 (기본값: 1000)
  requireTests: false                    # [선택] 테스트 필수 여부 (기본값: false)
  blockDirectBasePush: true              # [선택] 베이스 브랜치 직접 푸시 차단 (기본값: true)
  timeouts:                              # [선택] 타임아웃 설정
    planGeneration: 120000               # [선택] 계획 생성 타임아웃 ms (기본값: 120000)
    phaseImplementation: 600000          # [선택] Phase 구현 타임아웃 ms (기본값: 600000)
    reviewRound: 180000                  # [선택] 리뷰 라운드 타임아웃 ms (기본값: 180000)
    prCreation: 60000                    # [선택] PR 생성 타임아웃 ms (기본값: 60000)
  stopConditions:                        # [선택] 중단 조건 목록
    - "CRITICAL_ERROR"
    - "SECURITY_VIOLATION"
    - "BASE_BRANCH_MODIFIED"
  allowedLabels:                         # [선택] 허용된 라벨 목록 (기본값: [])
    - "ai-quartermaster"
  # Rollback strategy on pipeline failure:
  #   "none"        — no rollback (default)
  #   "all"         — reset to pre-pipeline HEAD (undo all phase commits)
  #   "failed-only" — reset to last successful phase commit
  rollbackStrategy: "none"               # [선택] 롤백 전략: none | all | failed-only (기본값: "none")
  feasibilityCheck:                      # [선택] 실행 가능성 체크 설정
    enabled: true                        # [선택] 실행 가능성 체크 활성화 (기본값: true)
    maxRequirements: 5                   # [선택] 최대 요구사항 수 (기본값: 5)
    maxFiles: 4                          # [선택] 최대 영향 파일 수 (기본값: 4)
    blockedKeywords:                     # [선택] 차단 키워드 목록
      - "architecture"
      - "refactor"
      - "migration"
      - "breaking change"
      - "major rewrite"
    skipReasons:                         # [선택] 건너뛰기 사유 목록
      - "Too many requirements (>5)"
      - "Too many files affected (>4)"
      - "Architecture change detected"
      - "Blocked keyword found"

# 실행 모드 프리셋 (GitHub 라벨로 선택)
# 작업 중요도에 맞는 검증 강도를 적용하여 토큰 소비를 최적화합니다.
# 라벨 형식: aqm-economy, aqm-thorough 또는 기존 aq-exec:economy, aq-exec:standard, aq-exec:thorough

executionModes:                         # [선택] 실행 모드별 설정 (기본값은 각 모드의 내장 프리셋)
  economy:                              # [선택] Economy 모드: 빠른 구현에 집중, 리뷰 스킵으로 토큰 소비 최소화
    reviewRounds: 0                     # [선택] 리뷰 라운드 수 (기본값: 0)
    enableAdvancedReview: false         # [선택] 고급 리뷰 활성화 (기본값: false)
    enableSimplify: false               # [선택] 코드 간소화 활성화 (기본값: false)
    enableFinalValidation: false        # [선택] 최종 검증 활성화 (기본값: false)
    maxPhases: 5                        # [선택] 최대 Phase 수 (기본값: 5)
    maxRetries: 1                       # [선택] 최대 재시도 횟수 (기본값: 1)
    # 적용 대상: 단순 수정, 문서 작업, 프로토타입

  standard:                             # [선택] Standard 모드: 균형 잡힌 품질과 효율성 (기본값)
    reviewRounds: 1                     # [선택] 리뷰 라운드 수 (기본값: 1)
    enableAdvancedReview: true          # [선택] 고급 리뷰 활성화 (기본값: true)
    enableSimplify: true                # [선택] 코드 간소화 활성화 (기본값: true)
    enableFinalValidation: true         # [선택] 최종 검증 활성화 (기본값: true)
    maxPhases: 10                       # [선택] 최대 Phase 수 (기본값: 10)
    maxRetries: 2                       # [선택] 최대 재시도 횟수 (기본값: 2)
    # 적용 대상: 일반적인 기능 개발, 버그 수정

  thorough:                             # [선택] Thorough 모드: 최고 수준의 코드 품질 보장
    reviewRounds: 3                     # [선택] 리뷰 라운드 수 (기본값: 3)
    enableAdvancedReview: true          # [선택] 고급 리뷰 활성화 (기본값: true)
    enableSimplify: true                # [선택] 코드 간소화 활성화 (기본값: true)
    enableFinalValidation: true         # [선택] 최종 검증 활성화 (기본값: true)
    maxPhases: 15                       # [선택] 최대 Phase 수 (기본값: 15)
    maxRetries: 3                       # [선택] 최대 재시도 횟수 (기본값: 3)
    # 적용 대상: 보안 기능, 아키텍처 변경, 중요한 API

# 사용법:
# 1. GitHub 이슈에 라벨 추가: aqm-economy, aqm-thorough (standard는 기본값)
# 2. 또는 기존 형식: aq-exec:economy, aq-exec:standard, aq-exec:thorough
# 3. 라벨이 없으면 standard 모드로 실행됩니다.